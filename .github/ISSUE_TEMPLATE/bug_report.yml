name: Bug report
description: Report incorrect CLI behavior or generated output.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide commands, sample commits, or a minimal repository shape.
      placeholder: |
        git log --oneline
        changelog-from-git-history --stdout
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, npm version, OS, and Git version.
