name: Feature request
description: Suggest a new capability or output improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What maintainer workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the CLI flags, output, or workflow you would expect.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: examples
    attributes:
      label: Example input/output
      description: Sample commits, changelog output, or JSON payloads help.
