name: Roadmap item
description: Track planned product work for maintainers.
title: "roadmap: "
labels: ["enhancement"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this is done?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: MVP scope
      description: What is included and explicitly excluded?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be tested or demonstrated?
